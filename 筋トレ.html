<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>アバター成長トレーニング（MVP）</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- 左：入力フォーム -->
    <section class="card grid-bg">
      <h1>アバター成長トレーニング（MVP）</h1>
      <p class="small">各種目の回数を入力するのだ！！ <b>そして実行ボタンを押せ！</b>。筋肉を肥大させるのだ！！。</p>
      <div class="sep"></div>

      <div class="row">
        <div>
          <label for="date">日付</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="btn" id="runBtn">実行</button>
          <button class="btn" id="resetBtn" style="margin-top:6px; background:#f28b82; color:#0b1130;">リセット</button>
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div style="grid-column: 1 / -1;">
          <label for="bgmVolume">BGM音量</label>
          <input id="bgmVolume" type="range" min="0" max="1" step="0.05" value="0.5" style="width:100%; cursor:pointer;" />
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div>
          <label for="pushupInput">腕立て伏せ（回）</label>
          <input id="pushupInput" type="number" inputmode="numeric" min="0" placeholder="0" />
        </div>
        <div>
          <label for="squatInput">スクワット（回）</label>
          <input id="squatInput" type="number" inputmode="numeric" min="0" placeholder="0" />
        </div>
      </div>
      <div class="row">
        <div>
          <label for="situpInput">腹筋（回）</label>
          <input id="situpInput" type="number" inputmode="numeric" min="0" placeholder="0" />
        </div>
        <div>
          <label for="pullupInput">懸垂（回）</label>
          <input id="pullupInput" type="number" inputmode="numeric" min="0" placeholder="0" />
        </div>
      </div>



      <div class="sep"></div>
      <div class="stats" id="totalsPanel"><!-- 合計表示 --></div>

      <div class="sep"></div>
      <div class="charts">
        <div class="small">直近7日：合計</div>
        <canvas id="weeklyTotal"></canvas>
        <div class="small">直近7日：種目別</div>
        <canvas id="weeklyByEx"></canvas>
      </div>
    </section>

    <!-- 右：アバター＋ログ＋カレンダー -->
    <section class="card">
      <div class="avatar-wrap">
        <svg id="avatar" viewBox="0 0 120 140" width="280" style="image-rendering: pixelated;">
          <defs>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.5" />
            </filter>
          </defs>
          <!-- 影 -->
          <rect x="10" y="126" width="100" height="6" fill="#000" opacity=".25" rx="3"/>

          <!-- 左脚：太もも＋すね（膝関節） -->
          <g id="legLUpper" transform="translate(50,96)">
            <rect x="0" y="0" width="9" height="12" fill="#3e57c6" stroke="#2a3a82" stroke-width="1"/>
            <g id="legLLower" transform="translate(0,12)">
              <rect x="0" y="0" width="8" height="12" fill="#3e57c6" stroke="#2a3a82" stroke-width="1"/>
              <rect x="-1" y="11" width="10" height="4" rx="1" fill="#2a2a3a" stroke="#1a1a2a" stroke-width="1"/>
            </g>
          </g>
          <!-- 右脚：太もも＋すね（膝関節） -->
          <g id="legRUpper" transform="translate(62,96)">
            <rect x="0" y="0" width="9" height="12" fill="#3e57c6" stroke="#2a3a82" stroke-width="1"/>
            <g id="legRLower" transform="translate(0,12)">
              <rect x="0" y="0" width="8" height="12" fill="#3e57c6" stroke="#2a3a82" stroke-width="1"/>
              <rect x="-1" y="11" width="10" height="4" rx="1" fill="#2a2a3a" stroke="#1a1a2a" stroke-width="1"/>
            </g>
          </g>

          <!-- 上半身グループ（スクワット・懸垂で上下移動） -->
          <g id="upperBody">
            <!-- 腹部 -->
            <g id="abs" transform="translate(49,80)">
              <rect x="0" y="0" width="22" height="16" fill="#f2b494" stroke="#c49377" stroke-width="1"/>
              <rect x="2" y="2" width="8" height="5" fill="#e59c7c" rx="1"/>
              <rect x="12" y="2" width="8" height="5" fill="#e59c7c" rx="1"/>
              <rect x="2" y="9" width="8" height="5" fill="#e59c7c" rx="1"/>
              <rect x="12" y="9" width="8" height="5" fill="#e59c7c" rx="1"/>
            </g>
            <!-- 胴体（胸/背中） -->
            <g id="torso" transform="translate(46,50)">
              <rect x="0" y="0" width="28" height="30" fill="#f6c09b" stroke="#c49377" stroke-width="1"/>
              <rect x="2" y="8" width="11" height="8" fill="#eaa889" rx="2"/>
              <rect x="15" y="8" width="11" height="8" fill="#eaa889" rx="2"/>
            </g>
            <!-- 左腕：上腕＋前腕（肘関節） -->
            <g id="armLUpper" transform="translate(38,52)">
              <rect x="0" y="0" width="9" height="14" fill="#f6c09b" stroke="#c49377" stroke-width="1" rx="2"/>
              <g id="armLFore" transform="translate(0,14)">
                <rect x="1" y="0" width="8" height="12" fill="#f6c09b" stroke="#c49377" stroke-width="1" rx="2"/>
                <rect x="1" y="11" width="7" height="5" fill="#f6c09b" stroke="#c49377" stroke-width="1" rx="1"/>
              </g>
            </g>
            <!-- 右腕：上腕＋前腕（肘関節） -->
            <g id="armRUpper" transform="translate(73,52)">
              <rect x="0" y="0" width="9" height="14" fill="#f6c09b" stroke="#c49377" stroke-width="1" rx="2"/>
              <g id="armRFore" transform="translate(0,14)">
                <rect x="0" y="0" width="8" height="12" fill="#f6c09b" stroke="#c49377" stroke-width="1" rx="2"/>
                <rect x="0" y="11" width="7" height="5" fill="#f6c09b" stroke="#c49377" stroke-width="1" rx="1"/>
              </g>
            </g>
            <!-- 頭 -->
            <g id="head" transform="translate(50,28)">
              <rect x="-2" y="-4" width="24" height="6" fill="#2b2b38" rx="1"/>
              <rect x="0" y="0" width="20" height="18" fill="#f6c09b" stroke="#c49377" stroke-width="1"/>
              <rect x="4" y="6" width="4" height="3" fill="#3a2b2b" rx="1"/>
              <rect x="12" y="6" width="4" height="3" fill="#3a2b2b" rx="1"/>
              <rect x="7" y="12" width="6" height="2" fill="#c47b66" rx="1"/>
            </g>
          </g>
        </svg>
      </div>

      <div class="sep"></div>
      <div class="small" style="margin-bottom:4px;"></div>
      <video id="bgVideo" autoplay loop muted playsinline width="100%" style="border-radius:8px;">
        <source src="動画生成：音楽・字幕なし.mp4" type="video/mp4">
      </video>

      <div class="sep"></div>
      <div class="log">
        <table>
          <thead>
            <tr><th>日付</th><th>種目</th><th>回数</th></tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>

      <div class="sep"></div>
      <div class="small">日別カレンダー</div>
      <div id="calendar" class="cal"></div>
    </section>
  </div>

  <script src="state.js"></script>
  <script src="anim.js"></script>
  <script src="charts.js"></script>
  <script src="dom.js"></script>
  <script src="avatar.js"></script>
  <script src="main.js"></script>
</body>
</html>
