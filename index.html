<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>アバター成長トレーニング（MVP）</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- 左：入力フォーム -->
    <section class="card grid-bg">
      <h1>アバター成長トレーニング（MVP）</h1>
      <p class="small">各種目の回数を入力するのだ！！ <b>そして実行ボタンを押せ！</b>。筋肉を肥大させるのだ！！。</p>
      <div class="sep"></div>

      <div class="row">
        <div>
          <label for="date">日付</label>
          <input id="date" type="date" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="btn" id="runBtn">実行</button>
          <button class="btn" id="resetBtn" style="margin-top:6px; background:#f28b82; color:#0b1130;">リセット</button>
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div style="grid-column: 1 / -1;">
          <label for="bgmVolume">BGM音量</label>
          <input id="bgmVolume" type="range" min="0" max="1" step="0.05" value="0.5" style="width:100%; cursor:pointer;" />
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div>
          <label for="pushupInput">腕立て伏せ（回）</label>
          <input id="pushupInput" type="number" inputmode="numeric" min="0" placeholder="0" />
        </div>
        <div>
          <label for="squatInput">スクワット（回）</label>
          <input id="squatInput" type="number" inputmode="numeric" min="0" placeholder="0" />
        </div>
      </div>
      <div class="row">
        <div>
          <label for="situpInput">腹筋（回）</label>
          <input id="situpInput" type="number" inputmode="numeric" min="0" placeholder="0" />
        </div>
        <div>
          <label for="pullupInput">懸垂（回）</label>
          <input id="pullupInput" type="number" inputmode="numeric" min="0" placeholder="0" />
        </div>
      </div>



      <div class="sep"></div>
      <div class="stats" id="totalsPanel"><!-- 合計表示 --></div>

      <div class="sep"></div>
      <div class="charts">
        <div class="small">直近7日：合計</div>
        <canvas id="weeklyTotal"></canvas>
        <div class="small">直近7日：種目別</div>
        <canvas id="weeklyByEx"></canvas>
        <div class="small">部位レベル：レーダー</div>
        <canvas id="radarChart" class="radar"></canvas>
      </div>
    </section>

    <!-- 右：アバター＋ログ＋カレンダー -->
    <section class="card">
      <div class="avatar-wrap">
        <video id="avatar" muted playsinline preload="auto" width="100%" style="border-radius:8px; width:100%;">
          <source src="example_video_smp_.mp4" type="video/mp4">
        </video>
      </div>

      <div class="sep"></div>
      <div class="small" style="margin-bottom:4px;"></div>
      <video id="bgVideo" autoplay loop muted playsinline width="100%" style="border-radius:8px;">
        <source src="動画生成：音楽・字幕なし.mp4" type="video/mp4">
      </video>

      <div class="sep"></div>
      <div class="log">
        <table>
          <thead>
            <tr><th>日付</th><th>種目</th><th>回数</th></tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>

      <div class="sep"></div>
      <div class="small">日別カレンダー</div>
      <div id="calendar" class="cal"></div>
    </section>
  </div>

  <script src="state.js"></script>
  <script src="anim.js"></script>
  <script src="charts.js"></script>
  <script src="dom.js"></script>
  <script src="avatar.js"></script>
  <script src="main.js"></script>
</body>
</html>
